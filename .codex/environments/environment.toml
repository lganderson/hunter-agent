# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "hunter-agent"

[setup]
script = """
python3 hunter.py init
python3 hunter.py load-demo-data --overwrite
make frontend-install
python3 hunter.py serve-ready ${PORT:-8011}
"""

[[actions]]
name = "Serve App"
icon = "run"
command = "python3 hunter.py serve-ready ${PORT:-8011}"

[[actions]]
name = "Frontend Dev"
icon = "run"
command = "python3 hunter.py serve-restart ${API_PORT:-8011} && make frontend-dev API_PORT=${API_PORT:-8011} VITE_PORT=${VITE_PORT:-5174}"

[[actions]]
name = "Load Demo Data"
icon = "database"
command = "python3 hunter.py load-demo-data --overwrite"

[[actions]]
name = "Build"
icon = "tool"
command = "cd app && npm run build"

[[actions]]
name = "Check"
icon = "check"
command = "cd app && npm run typecheck && cd .. && python3 hunter.py repo-check"

[[actions]]
name = "Clean Caches"
icon = "trash"
command = "python3 hunter.py clean-caches"
